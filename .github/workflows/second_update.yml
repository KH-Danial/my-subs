name: Second List Update

on:
  schedule:
    - cron: '0 */6 * * *' # اجرای خودکار هر ۶ ساعت
  workflow_dispatch:      # قابلیت اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Fetch and Filter Script
        run: python fetch_second_list.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add second_sub.txt
          git commit -m "Update second_sub.txt" || echo "No changes"
          git push
          

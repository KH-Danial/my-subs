name: 🕵️ Market Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # هر ۶ ساعت یکبار
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 دریافت کدها
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 نصب نیازمندی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 🔍 اجرای اسکریپت تحلیل
        run: python fetch_and_analyze.py
        continue-on-error: true  # ادامه اجرا حتی در صورت خطا
      
      - name: 💾 ثبت تغییرات در مخزن
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add price_history.json README.md market_report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "📝 تغییری برای commit وجود ندارد"
          else
            git commit -m "به‌روزرسانی خودکار گزارش بازار - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ تغییرات با موفقیت push شد"
          fi
name: 'Hourly Update'

on:
  schedule:
    - cron: '0 */6 * * *'   # هر ۶ ساعت یکبار
  workflow_dispatch:         # قابلیت اجرای دستی

# فقط یک نمونه از workflow در حال اجرا باشد
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12      # حداکثر زمان اجرا ۱۲ دقیقه (پیشگیری از قفل شدن)
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      - name: Run Fetch and Filter Script
        run: python fetch_configs.py

      - name: Remove duplicate configs
        run: python delete_duplicate_name.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.txt stats.json
          git diff --staged --quiet || git commit -m "Update all config files (deduplicated)"
          git push
